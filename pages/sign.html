<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steam Game Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../css/sign.css">
  <script src="../js/sign.js" type="module"></script>
</head>


<body>
    <div class="content">
        <!-- Mensaje Principal -->
        <div class="banner">
            <h1><b>Steam Game Explorer</b></h1>
            <h5>Mantente al dia de tus videojuegos de Steam favoritos</h5>
        </div>

        <!-- Formulario de Log In -->
        <div id="logInCont" class="section featured-game sign-form">
            <h1><b>Iniciar Sesion</b></h1>
            <form id="signInForm" action="">

                <label class="form-label" for="emailIn">Correo:</label>
                <input id="emailIn" class="form-control" type="email" class="form-control mb-3" placeholder="Email" required>

                <label class="form-label" for="passwordIn">Contraseña:</label>
                <input id="passwordIn" class="form-control" type="password" class="form-control mb-3" placeholder="****" required>

                <button id="form-button-log" class="btn btn-primary form-button" type="submit">Iniciar Sesion</button>
                <a id="log-btn" class="form-legend">Crear una cuenta</a>
            </form>
        </div>

        <!-- Formulario de Sign Up -->
        <div id="signUpCont" class="section featured-game sign-form hidden">
            <h1><b>Crear Cuenta</b></h1>
            <form id="signUpForm" action="">

                <label class="form-label" for="userUp">Usuario:</label>
                <input id="userUp" class="form-control" type="text" class="form-control mb-3" placeholder="Username" required>

                <label class="form-label" for="emailUp">Correo:</label>
                <input id="emailUp" class="form-control" type="email" class="form-control mb-3" placeholder="Email" required>

                <label class="form-label" for="passwordUp">Contraseña:</label>
                <input id="passwordUp" class="form-control" type="password" class="form-control mb-3" placeholder="****" required>

                <button id="form-button-sign" class="btn btn-primary form-button" type="submit">Registrarse</button>
                <a id="sign-btn" class="form-legend">Iniciar Sesion</a>
            </form>
        </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
</body>

</html>
