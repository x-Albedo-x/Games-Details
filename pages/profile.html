<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steam Game Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../css/profile.css">
  <script src="../js/profile.js" type="module"></script>
</head>

<body>
  <!-- Header fijo con navegación -->
  <header class="header">
      <div class="header-content">
          <h1>Steam Game Explorer</h1>
          <nav class="nav-menu">
              <a href="../index.html" class="nav-btn">🏠 Inicio</a>
              <a id="register" class="nav-btn active">👤 Ingresar</a>
          </nav>
      </div>
  </header>

  <!-- Página de Juegos Guardados -->
  <div class="page active" id="media">
      <div class="container">
          <div class="section saved">
              <h2>📗 Juegos Guardados</h2>
              <div id="game-list" class="mail-disp video-item game-list"></div>
          </div>

          <div class="section section-perf">
              <h2>ℹ️ Perfil</h2>
              <div class="mail-disp video-item info-container">
                <div class="info-text">
                    <p><b>Correo</b></p>
                    <p id="mail-display"></p>
                </div>
                <button class="btn btn-secondary info-btn" data-bs-toggle="modal" data-bs-target="#emailModal">✏️</button>
              </div>
              <div class="video-item info-container">
                <div class="info-text">
                    <p><b>Contraseña</b></p>
                    <p id="pass-display">&#9679&#9679&#9679&#9679&#9679&#9679</p>
                </div>
                <button class="btn btn-secondary info-btn" data-bs-toggle="modal" data-bs-target="#passModal">✏️</button>
              </div>
              <div class="video-item info-container">
                <div class="info-text">
                    <p><b>Username</b></p>
                    <p id="user-display"></p>
                </div>
                <button class="btn btn-secondary info-btn" data-bs-toggle="modal" data-bs-target="#userModal">✏️</button>
              </div>
              <button id="logout" class="btn btn-secondary">Cerrar Sesion</button>
              <button id="erase" class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#eraseModal">Eliminar Cuenta</button>
          </div>
      </div>
  </div>

  <!-- Modal Cambio de Correo -->
    <div class="modal fade" id="emailModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content bg-secondary">
                <div class="modal-header">
                    <h1 class="modal-title fs-5 white" id="exampleModalLabel">Cambiar Correo</h1>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="emailForm" action="">

                        <label class="white" for="emailInput">Nuevo Correo:</label>
                        <input id="emailInput" class="form-control" type="email" class="form-control mb-3" placeholder="E-mail" required>

                        <label class="white" for="emailInput">Confirme Contraseña:</label>
                        <input id="emailConfirm" class="form-control" type="password" class="form-control mb-3" placeholder="****" required>

                        <button class="btn btn-dark" type="submit">Aceptar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Cambio de Contraseña -->
    <div class="modal fade" id="passModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content bg-secondary">
                <div class="modal-header">
                    <h1 class="modal-title fs-5 white" id="exampleModalLabel">Cambiar Contraseña</h1>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="passForm" action="">

                        <label class="white" for="passOneInput">Nueva Contraseña:</label>
                        <input id="passOneInput" class="form-control" type="password" class="form-control mb-3" placeholder="****" required>

                        <label class="white" for="passTwoInput">Repita la Nueva Contraseña:</label>
                        <input id="passTwoInput" class="form-control" type="password" class="form-control mb-3" placeholder="****" required>

                        <label class="white" for="passConfirm">Confirme la Contraseña Actual:</label>
                        <input id="passConfirm" class="form-control" type="password" class="form-control mb-3" placeholder="****" required>

                        <button class="btn btn-dark" type="submit">Aceptar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Cambio de Usuario -->
    <div class="modal fade" id="userModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content bg-secondary">
                <div class="modal-header">
                    <h1 class="modal-title fs-5 white" id="exampleModalLabel">Cambiar Usuario</h1>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="userForm" action="">

                        <label class="white" for="userInput">Nuevo Usuario:</label>
                        <input id="userInput" class="form-control" type="text" class="form-control mb-3" placeholder="Username" required>

                        <label class="white" for="userConfirm">Confirme Contraseña:</label>
                        <input id="userConfirm" class="form-control" type="password" class="form-control mb-3" placeholder="****" required>

                        <button class="btn btn-dark" type="submit">Aceptar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Eliminar Usuario -->
    <div class="modal fade" id="eraseModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content bg-danger">
                <div class="modal-header">
                    <h1 class="modal-title fs-5 white" id="exampleModalLabel">Eliminar Cuenta</h1>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="eraseForm" action="">
                        <p class="white" style="text-align: center;"><b>ADVERTENCIA: No podras recuperar tus datos.</b></p>
                        <label class="white" for="eraseConfirm">Confirme Contraseña:</label>
                        <input id="eraseConfirm" class="form-control" type="password" class="form-control mb-3" placeholder="****" required>

                        <button id="eraseAccept" class="btn btn-warning" type="submit">Aceptar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
</body>

</html>
