<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steam Game Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <script src="../js/similar.js" defer></script>
</head>

<body>
  <!-- Header fijo con navegación -->
  <header class="header">
    <div class="header-content">
      <h1>Steam Game Explorer</h1>
      <nav class="nav-menu">
        <a href="../index.html" class="nav-btn">🏠 Inicio</a>

        <a href="../pages/media.html" class="nav-btn">📸 Media</a>
        <a href="../pages/community.html" class="nav-btn">👥 Comunidad</a>
      </nav>
    </div>
  </header>

  <!-- Página de Juegos Similares -->
  <div class="page active" id="similar">
    <div class="container">
      <div class="section">
        <h2 id="busqueda-title">🔍 Juegos</h2>
        <div class="similar-games-grid" id="games-content">
        </div>
      </div>

      <div class="section">
        <h2>🏆 Recomendaciones Personalizadas</h2>
        <div class="recommendations">
          <div class="recommendation-item">
            <span class="rec-icon">🎯</span>
            <div class="rec-content">
              <h4>Basado en tus preferencias</h4>
              <p>Juegos que podrían gustarte según tu historial</p>
            </div>
          </div>
          <div class="recommendation-item">
            <span class="rec-icon">🔥</span>
            <div class="rec-content">
              <h4>Tendencias actuales</h4>
              <p>Los juegos más populares en este momento</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
